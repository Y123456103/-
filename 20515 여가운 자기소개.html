<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가운이네 미니홈피 ˚₊·—̳͟͞͞♡</title>
    <style>
        /* Y2K 감성을 위한 스타일 */
        body {
            background-color: #E0F7FA; /* 민트색 배경 */
            color: #5D4037;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-frame {
            background-color: #FFFDE7; /* 아이보리색 본체 */
            width: 800px;
            border: 3px double #81C784;
            padding: 20px;
            box-shadow: 5px 5px 0px #BDBDBD;
        }

        header {
            text-align: center;
            border-bottom: 2px dashed #81C784;
            margin-bottom: 20px;
        }

        h1 { color: #FF8A65; font-size: 2.5rem; text-shadow: 2px 2px #FFF; }

        .content-box {
            background: #E8F5E9;
            border: 2px solid #A5D6A7;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #FFF;
            padding: 10px;
            border: 2px solid #FFCCBC;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover { background: #FFAB91; color: white; }

        footer { text-align: center; margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="main-frame">
    <header>
        <h1>˚₊·—̳͟͞͞♡ 가운이네 놀러와! ˚₊·—̳͟͞͞♡</h1>
        <p id="typing"></p>
    </header>

    <div class="content-box">
        <h3>✨ About Me</h3>
        <p>차분하지만 생각은 많음! 음악을 좋아해요.</p>
    </div>

    <div class="card-grid">
        <div class="card">🎧 관심사: 음악</div>
        <div class="card">💤 취미: 잠자기</div>
        <div class="card">✈️ 좋아하는 것: 여행</div>
        <div class="card">🎯 목표: 대학 가기!</div>
    </div>

    <div class="content-box">
        <h3>🌈 My Dreams</h3>
        <p>혼자 해외여행 가기, 친구랑 자취하기, 돈 많이 벌기!</p>
    </div>

    <footer>
        <p>Made with AI & My Imagination</p>
        <p>© 2026 Gaun's Minihome</p>
    </footer>
</div>

<script>
    const text = "차분한 척 하지만 사실 활발하고 헐렁거리는 가운이의 공간입니다. :)";
    let i = 0;
    function type() {
        if (i < text.length) {
            document.getElementById('typing').innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 100);
        }
    }
    type();
</script>

</body>
</html>
